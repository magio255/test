    description: Přístup k /playtime.
    default: true
  magiocore.coinflip:
    description: Přístup k /coinflip.
    default: true
  magiocore.invsee:
    description: Přístup k /invsee.
    default: op
  magiocore.baltop:
    description: Access to /baltop.
    default: true
  magiocore.broadcast:
    description: Přístup k /broadcast.
    default: op
  magiocore.anvil:
    description: Přístup k /anvil.
    default: op
  magiocore.disposal:
    description: Přístup k /disposal.
    default: op
  magiocore.feed:
    description: Přístup k /feed.
    default: op
  magiocore.fly:
    description: Přístup k /fly.
    default: op
  magiocore.grindstone:
    description: Přístup k /grindstone.
    default: op
  magiocore.hat:
    description: Přístup k /hat.
    default: true
  magiocore.heal:
    description: Přístup k /heal.
    default: op
  magiocore.loom:
    description: Přístup k /loom.
    default: op
  magiocore.ptime:
    description: Přístup k /ptime.
    default: true
  magiocore.pweather:
    description: Přístup k /pweather.
    default: true
  magiocore.repair:
    description: Přístup k /repair.
    default: op
  magiocore.smithingtable:
    description: Přístup k /smithingtable.
    default: op
  magiocore.workbench:
    description: Přístup k /workbench.
    default: op
  magiocore.home.0:
    default: true
  magiocore.home.1:
