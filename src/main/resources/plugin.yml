name: MagioCore
version: 1.0
main: me.jules.magiocore.MagioCore
api-version: 1.21
commands:
  home:
    description: Otevře menu domovů nebo tě teleportuje.
    usage: /home [číslo]
  sethome:
    description: Nastaví domov.
    usage: /sethome [číslo]
  tpa:
    description: Žádost o teleport k hráči.
    usage: /tpa <hráč>
  tpahere:
    description: Žádost, aby se hráč teleportoval k tobě.
    usage: /tpahere <hráč>
  tpacancel:
    description: Zruší tvou odeslanou žádost o teleport.
    usage: /tpacancel
  tpaoff:
    description: Přepne přijímání žádostí o teleport.
    usage: /tpaoff
  tpaccept:
    description: Přijme žádost o teleport.
    usage: /tpaccept
    aliases: [tpaaccept]
  tpadeny:
    description: Odmítne žádost o teleport.
    usage: /tpadeny
    aliases: [tpdeny, tpa-deny]
  spawn:
    description: Teleport na spawn.
    usage: /spawn
  setspawn:
    description: Nastaví lokaci spawnu.
    usage: /setspawn
  gmc:
    description: Změní herní mód na kreativní.
    usage: /gmc
  gms:
    description: Změní herní mód na survival.
    usage: /gms
  gmsp:
    description: Změní herní mód na spectator.
    usage: /gmsp
  gma:
    description: Změní herní mód na adventure.
    usage: /gma
  rtp:
    description: Náhodný teleport.
    usage: /rtp
  flyspeed:
    description: Nastaví tvou rychlost létání.
    usage: /flyspeed [1-10]
  playtime:
    description: Ukáže odehraný čas.
    usage: /playtime [hráč]
  coinflip:
    description: Hazardní hra coinflip.
    usage: /coinflip [částka]
    aliases: [cf]
  invsee:
    description: Zobrazí inventář jiného hráče.
    usage: /invsee <hráč>
  baltop:
    description: Zobrazí žebříček nejbohatších hráčů.
    usage: /baltop [strana]
  broadcast:
    description: Odešle zprávu všem hráčům.
    usage: /broadcast <zpráva>
  anvil:
    description: Otevře kovadlinu.
    usage: /anvil
  disposal:
    description: Otevře odpadkový koš.
    usage: /disposal
    aliases: [trash, etrash, edisposal]
  feed:
    description: Doplní hlad.
    usage: /feed [hráč]
    aliases: [eat, eeat, efeed]
  fly:
    description: Přepne létání.
    usage: /fly [hráč] [on|off]
    aliases: [efly]
  grindstone:
    description: Otevře brusku.
    usage: /grindstone
    aliases: [egrindstone]
  hat:
    description: Nasadí si předmět na hlavu.
    usage: /hat [remove]
    aliases: [head, ehat, ehead]
  heal:
    description: Vyléčí hráče.
    usage: /heal [hráč]
    aliases: [eheal]
  loom:
    description: Otevře tkalcovský stav.
    usage: /loom
    aliases: [eloom]
  ptime:
    description: Nastaví tvůj klientský čas.
    usage: /ptime [list|reset|day|night|dawn|ticks] [hráč]
    aliases: [playertime, eptime, eplayertime]
  pweather:
    description: Nastaví tvé klientské počasí.
    usage: /pweather [list|reset|storm|sun|clear] [hráč]
    aliases: [playerweather, epweather, eplayerweather]
  repair:
    description: Opraví předmět.
    usage: /repair [hand|all]
    aliases: [fix, efix, erepair]
  smithingtable:
    description: Otevře kovářský stůl.
    usage: /smithingtable
    aliases: [smithtable, esmithtable, esmithingtable]
  suicide:
    description: Ukončí tvůj život.
    usage: /suicide
    aliases: [esuicide]
  workbench:
    description: Otevře pracovní stůl.
    usage: /workbench
    aliases: [wb, craft, wbench]
permissions:
  magiocore.home:
    description: Přístup k příkazům domovů.
    default: true
  magiocore.tpa:
    description: Přístup k TPA příkazům.
    default: true
  magiocore.spawn:
    description: Přístup k příkazům spawnu.
    default: true
  magiocore.admin:
    description: Přístup k administrátorským příkazům.
    default: op
  magiocore.gmc:
    description: Přístup k /gmc.
    default: op
  magiocore.gms:
    description: Přístup k /gms.
    default: op
  magiocore.gmsp:
    description: Přístup k /gmsp.
    default: op
  magiocore.gma:
    description: Přístup k /gma.
    default: op
  magiocore.rtp:
    description: Přístup k /rtp.
    default: true
  magiocore.flyspeed:
    description: Přístup k /flyspeed.
    default: op
