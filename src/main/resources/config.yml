# ExploitFixer Configuration

# Zprávy
messages:
  prefix: "&8[&cExploitFixer&8] &7"
  no-permission: "&cNemáš oprávnění k použití tohoto příkazu."
  reload: "&aKonfigurace byla úspěšně načtena."
  notifications-on: "&aUpozornění zapnuta."
  notifications-off: "&cUpozornění vypnuta."
  kick-message: |
    #FFEE59⚡  #fb6900&lczskSMP&r  #FFEE59⚡
      &f&m                   &r

      &f❕ #fc9a54&lʏᴏᴜ'ʀᴇ ʙᴀɴɴᴇᴅ ꜰʀᴏᴍ ᴛʜᴇ sᴇʀᴠᴇʀ&r &f❕

      #fc9a54👤 &fᴜsᴇʀɴᴀᴍᴇ &8→ #fc9a54%player% &8←
      #fc9a54⌚ &fᴘᴜɴɪsʜᴇᴅ ᴏɴ &8→ #fc9a54%date% &8←
      #fc9a54🛠 &fᴘᴜɴɪsʜᴇᴅ ʙʏ &8→ #fc9a54ExploitFixer &8←
      #fc9a54✎ &fʀᴇᴀsᴏɴ &8→ #fc9a54%reason% &8←

      &f&m                                              &r

      #fc9a54📆 &fᴇxᴘɪʀʏ ᴅᴀᴛᴇ &8→ #fc9a54Never &8←
      #fc9a54⌛ &fᴇxᴘɪʀᴇs ɪɴ &8→ #fc9a54Permanent &8←

      &f&m                                              &r

      #fc9a54ℹ &fᴘᴜɴɪsʜᴍᴇɴᴛ ɪᴅ &8→ #fc9a54#%id% &8←
  notify-format: "&8[&cExploitFixer&8] &e%player% &7se pokusil o exploit: &c%reason%"

# Sign Fix
sign-fix:
  enabled: true
  max-line-length: 45
  max-total-length: 180

# Book Fix
book-fix:
  enabled: true
  max-pages: 50
  max-title-length: 32
  max-total-size: 10000 # Bajty přibližně

# Lectern Fix
lectern-fix:
  enabled: true
  cooldown-ms: 500

# Creative Fix
creative-fix:
  enabled: true
  max-nbt-depth: 10
  max-nbt-size: 5000

# Payload Fix
payload-fix:
  enabled: true
  # Povolit pouze vanilla a běžné kanály pluginů (musí být ve formátu namespace:key)
  allowed-channels:
    - "minecraft:brand"
    - "bungeecord:main"
    - "minecraft:bsign"
    - "minecraft:bedit"
    - "voicechat:state"
    - "voicechat:secret"
    - "vv:server_details"
    - "feather:client"
    - "distant_horizons:message"
    - "fabric:attachment_sync_v1"
    - "appleskin:saturation"
    - "essential:connection"

# Frame Fix (Hustota entit)
frame-fix:
  enabled: true
  max-per-chunk: 50

# Entity Fix
entity-fix:
  enabled: true

# Anti-Forge
anti-forge:
  enabled: true
  block-all: false # Set to true to block all Forge users

# Specific Crasher Protection (Hypixel, PacketEvents, etc.)
crasher-protection:
  enabled: true
  max-nbt-depth: 10
  max-packet-size: 32767

# One-Day Exploits
one-day-exploits:
  enabled: true

# Packet Limiter (Anti Netty Proxy / CPU Overload)
packet-limiter:
  enabled: true
  max-packets-per-second: 100
  vl-threshold: 5
  printer-compatibility: true

# Packet Logger
packet-logger:
  enabled: true
  console: true
  log-heavy-packets: true

# Netty Crasher Protection
netty-crasher:
  enabled: true
  # Block packets that take too long to process (simulated via size/depth)
  max-packet-size: 32767
