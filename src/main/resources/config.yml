# MagioCore Config

# Join Message Settings
join-message:
  show-head: true

  # Global message shown when a player joins for the first time
  first-join:
    format: "§b%player% §7se poprvé připojil! Vítej na §bCZSK SMP§7!"
    side-messages:
      - ""
      - "§b§lVÍTEJ"
      - "§7Hráč §b%player%"
      - "§7se poprvé"
      - "§7připojil na"
      - "§bCZSK SMP!"
      - ""
      - ""

  # Private message shown to the player when they login
  private-welcome:
    format: "§7Vítej zpět, §b%player%§7! Doufáme, že si tu užiješ čas."
    side-messages:
      - ""
      - "§b§lVÍTEJ ZPĚT"
      - "§7Ahoj §b%player%§7!"
      - "§7Doufáme, že si"
      - "§7u nás na serveru"
      - "§7užiješ spoustu"
      - "§7zábavy!"
      - ""

