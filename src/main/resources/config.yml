# ExploitFixer Configuration

# Zprávy
messages:
  prefix: "&8[&cExploitFixer&8] &7"
  no-permission: "&cNemáš oprávnění k použití tohoto příkazu."
  reload: "&aKonfigurace byla úspěšně načtena."
  notifications-on: "&aUpozornění zapnuta."
  notifications-off: "&cUpozornění vypnuta."
  kick-message: "&c[ExploitFixer] &7Byl jsi vyhozen za: &c%reason%"
  notify-format: "&8[&cExploitFixer&8] &e%player% &7se pokusil o exploit: &c%reason%"

# Sign Fix
sign-fix:
  enabled: true
  max-line-length: 45
  max-total-length: 180

# Book Fix
book-fix:
  enabled: true
  max-pages: 50
  max-title-length: 32
  max-total-size: 10000 # Bajty přibližně

# Lectern Fix
lectern-fix:
  enabled: true
  cooldown-ms: 500

# Creative Fix
creative-fix:
  enabled: true
  max-nbt-depth: 10
  max-nbt-size: 5000

# Payload Fix
payload-fix:
  enabled: true
  # Povolit pouze vanilla a běžné kanály pluginů (musí být ve formátu namespace:key)
  allowed-channels:
    - "minecraft:brand"
    - "bungeecord:main"
    - "minecraft:bsign"
    - "minecraft:bedit"
    - "voicechat:state"
    - "voicechat:secret"
    - "vv:server_details"

# Frame Fix (Hustota entit)
frame-fix:
  enabled: true
  max-per-chunk: 50

# Packet Limiter (Anti Netty Proxy / CPU Overload)
packet-limiter:
  enabled: true
  max-packets-per-second: 100
