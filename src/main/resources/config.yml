# CzechCore Config

# Join Message Settings
join-message:
  show-head: true

  # Global message shown when a player joins for the first time
  first-join:
    format: "&#00fbff&l%player% §7se poprvé připojil! Vítej na &#00fbff&lCZSK SMP! 🎉"
    side-messages:
      - ""
      - "&#00fbff&lVÍTEJ"
      - "§7Hráč &#00fbff&l%player%"
      - "§7se poprvé"
      - "§7připojil na"
      - "&#00fbff&lCZSK SMP!"
      - ""
      - "§7Užij si to! 🎈"

  # Private message shown to the player when they login
  private-welcome:
    format: "§7Vítej zpět, &#00fbff&l%player%§7! Doufáme, že si tu užiješ čas. 👋"
    side-messages:
      - ""
      - "&#00fbff&lVÍTEJ ZPĚT"
      - "§7Ahoj &#00fbff&l%player%§7!"
      - "§7Doufáme, že si"
      - "§7u nás na serveru"
      - "§7užiješ spoustu"
      - "§7zábavy!"
      - "§7Šťastné hraní! 🎮"

# Anti Spam Settings
anti-spam:
  delay: 2 # Delay in seconds between messages

